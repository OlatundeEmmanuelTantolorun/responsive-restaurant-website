<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->

      src="https://www.googletagmanager.com/gtag/js?id=G-463414Z5FL"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {

      }

      gtag("config", "G-463414Z5FL");

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elitz-home</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <!-- Font Awesome (local) -->
    <link rel="stylesheet" href="./css/pall.min.css" />
    <script defer src="./js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <!-- NavBar Section -->
    <section id="menu-section">
      <!-- Enhanced Navigation Bar -->
      <nav
        class="navbar navbar-expand-md navbar-dark text-light"
        style="
          background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
          padding-top: 0;
          padding-bottom: 0;
        "
      >
        <div class="container-fluid px-3 px-lg-5">
          <!-- Brand Logo & Name -->
          <div class="navbar-brand-wrapper d-flex align-items-center">
            <img
              class="me-2 img-fluid logo"
              src="./assets/restaurantGallery/logo.png"
              alt="Elitz Logo"
              style="max-width: 70px; max-height: 50px"
            />
            <span class="navbar-brand text-warning h1 mb-0" id="nav-title"
              >Elitz</span
            >
          </div>
          <!-- Mobile Toggle Button -->
          <button
            class="navbar-toggler shadow-sm border-1 border-warning"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarID"
            aria-controls="navbarID"
            aria-expanded="false"
            aria-label="Toggle navigation"
            style="padding: 0.25rem 0.75rem"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <!-- Navbar Items. -->
          <div
            class="collapse navbar-collapse justify-content-md-end"
            id="navbarID"
          >
            <div class="navbar-nav align-items-center">
              <a
                class="nav-link text-center text-light position-relative active px-3 py-2 mx-1"
                aria-current="page"
                href="./index.html"
                >Home</a
              >
              <a
                class="nav-link text-light position-relative px-3 py-2 mx-1"
                href="./menu.html"
                >Menus</a
              >
              <a
                class="nav-link text-light position-relative px-3 py-2 mx-1"
                href="./gallery.html"
                >Gallery</a
              >
              <!-- Dropdown with Enhanced Styling -->
              <li class="nav-item dropdown ms-lg-2">
                <a
                  class="nav-link dropdown-toggle text-light position-relative px-3 py-2"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                  id="aboutDropdown"
                >
                  About
                </a>
                <ul
                  class="dropdown-menu dropdown-menu-end border-warning"
                  style="
                    background: linear-gradient(
                      135deg,
                      #2c2c2c 0%,
                      #1a1a1a 100%
                    );
                    border-width: 2px;
                  "
                >
                  <li>
                    <a
                      class="dropdown-item text-light py-2 px-3"
                      href="./about.html"
                    >
                      <i class="fas fa-building me-2"></i>About Company
                    </a>
                  </li>
                  <li>
                    <a
                      class="dropdown-item text-light py-2 px-3"
                      href="about.html#get-in-touch"
                    >
                      <i class="fas fa-address-book me-2"></i>Contacts
                    </a>
                  </li>
                </ul>
              </li>
            </div>
          </div>
        </div>
      </nav>
    </section>
    <!-- Hero Section -->
    <section class="hero">
      <div class="container text-light">
        <div class="row align-items-center">
          <div class="col-md-6 hero-text">
            <span class="text-white">Welcome to</span>
            <h1 class="hero-head">
              <span class="text-warning fw-bold">E</span>litz
              <span class="text-warning fw-bold">R</span>estaurant
            </h1>
            <p class="hero-desc">
              Reserve your table now
              <span class="text-warning fw-bold">!!!</span><br />
              Experience the best of our culinary delights.<br />
              See our specials for mouth-watering options
            </p>
            <a
              href="menu.html"
              class="btn btn-md btn-outline-danger bg-warning text-dark rounded-pill shadow-lg home-btn"
            >
              See Menus
            </a>
          </div>
          <div class="col-md-6 text-center hero-image">
            <img
              class="img-fluid hero-png"
              src="./assets/restaurantGallery/food.png"
              alt="background png"
            />
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
